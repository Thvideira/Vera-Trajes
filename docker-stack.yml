services:
  postgres:
    image: postgres:17-alpine
    environment:
      TZ: America/Sao_Paulo
      PG_TZ: America/Sao_Paulo
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-vera-trajes}"
    volumes:
      - vera_trajes_pgdata:/var/lib/postgresql/data
    networks:
      - vera-trajes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    image: "vera-trajes-api:${APP_VERSION:-latest}"
    environment:
      - DATABASE_URL = ${DATABASE_URL}
      - PORT = ${PORT}
      - NODE_ENV = ${NODE_ENV}
      - JWT_SECRET = ${JWT_SECRET}
      - JWT_EXPIRES_IN = ${JWT_EXPIRES_IN}
      - CORS_ORIGIN = ${CORS_ORIGIN}
      - PUBLIC_BASE_URL = ${PUBLIC_BASE_URL}
      - UPLOAD_MODE = ${UPLOAD_MODE}
      - UPLOAD_LOCAL_DIR = ${UPLOAD_LOCAL_DIR}
      - AUTH_DISABLED = ${AUTH_DISABLED}
      - CRON_ENABLED = ${CRON_ENABLED}
      - CLOUDINARY_CLOUD_NAME = ${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY = ${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET = ${CLOUDINARY_API_SECRET}
      - CLOUDINARY_FOLDER = ${CLOUDINARY_FOLDER}
      - WHATSAPP_TOKEN = ${WHATSAPP_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID = ${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_API_VERSION = ${WHATSAPP_API_VERSION}
    networks:
      - vera-trajes-network
    volumes:
      - vera_trajes_uploads:/app/uploads
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: "vera-trajes-web:${APP_VERSION:-latest}"
    networks:
      - main_network
      - vera-trajes-network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    labels:
      - traefik.enable=true
      - traefik.docker.network=main_network
      - traefik.http.middlewares.redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-https.redirectscheme.permanent=true
      - traefik.http.routers.vera-trajes-web-https.service=vera-trajes-web
      - traefik.http.routers.vera-trajes-web-https.rule=Host(`vera-store.cetara.dev.br`)
      - traefik.http.routers.vera-trajes-web-https.entrypoints=websecure
      - traefik.http.routers.vera-trajes-web-https.tls.certresolver=letsencryptresolver
      - traefik.http.routers.vera-trajes-web-https.tls=true
      - traefik.http.routers.vera-trajes-web-https.priority=1
      - traefik.http.services.vera-trajes-web.loadbalancer.server.port=80

volumes:
  vera_trajes_uploads:
  vera_trajes_pgdata:

networks:
  vera-trajes-network:
  main_network:
    external: true
