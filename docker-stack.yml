version: "3.8"

# Variavel de ambiente exigida no deploy: APP_VERSION (ex.: 1.0.0) — o deploy.sh define.
# Crie o ficheiro .env neste diretorio no servidor (junto a este YAML), com base em backend/.env.example:
#   DATABASE_URL, JWT_SECRET, CORS_ORIGIN, PUBLIC_BASE_URL, UPLOAD_*, etc.

services:
  api:
    image: "vera-trajes-api:${APP_VERSION:-latest}"
    env_file:
      - .env
    networks:
      - main_network
    volumes:
      - vera_trajes_uploads:/app/uploads
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: "vera-trajes-web:${APP_VERSION:-latest}"
    networks:
      - main_network
    ports:
      - "80:80"
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  vera_trajes_uploads:

networks:
  main_network:
    external: true
